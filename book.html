<!DOCTYPE html>
<html>
<head>
<title>Book Table</title>
<link rel="stylesheet" href="file.css">

<style>
body{
background:#fdf6ec;
}

.box{
width:60%;
margin:100px auto;
background:#fff;
padding:40px;
border-radius:20px;
box-shadow:0 0 15px #ddd;
}

h1{
text-align:center;
color:#5a3c3c;
margin-bottom:30px;
}

input{
width:100%;
padding:12px;
margin:12px 0;
border:1px solid #ccc;
border-radius:8px;
}

.book-btn{
width:100%;
padding:15px;
background:#c57b32;
border:none;
color:#fff;
border-radius:30px;
margin-top:20px;
}

</style>

</head>
<body>

<div class="box">

<h1>Book Your Table</h1>

<form>
<input type="text" placeholder="Your Name" required>

<input type="tel" placeholder="Phone Number" required>

<input type="date" required>

<input type="number" placeholder="Number of Guests" required>

<button class="book-btn">
Confirm Booking
</button>
</form>

<br>

<center>
<a href="index.html" class="btn-gold">
Back Home
</a>
</center>

</div>

</body>
</html>
