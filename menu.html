<!DOCTYPE html>
<html>
<head>
    <title>Menu Table</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f4f4f4;
            text-align: center;
        }

        h1 {
            color: #333;
        }

        table {
            margin: 20px auto;
            border-collapse: collapse;
            width: 60%;
            background-color: white;
        }

        th, td {
            padding: 12px;
            border: 1px solid #ddd;
        }

        th {
            background-color: #4CAF50;
            color: white;
        }

        tr:hover {
            background-color: #f1f1f1;
        }

        button {
            padding: 6px 12px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }
    </style>
</head>

<body>

<h1>Restaurant Menu</h1>

<table>
    <tr>
        <th>Item No</th>
        <th>Item Name</th>
        <th>Price</th>
        <th>Action</th>
    </tr>

    <tr>
        <td>1</td>
        <td>Pizza</td>
        <td>₹150</td>
        <td><button>Order</button></td>
    </tr>

    <tr>
        <td>2</td>
        <td>Burger</td>
        <td>₹80</td>
        <td><button>Order</button></td>
    </tr>

    <tr>
        <td>3</td>
        <td>Pasta</td>
        <td>₹120</td>
        <td><button>Order</button></td>
    </tr>

</table>

</body>
</html>
