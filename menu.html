<!DOCTYPE html>
<html>
<head>
<title>Menu</title>
<link rel="stylesheet" href="file.css">

<style>
body{
background:#fdf6ec;
}

.menu{
padding:80px 50px;
text-align:center;
}

.menu h1{
color:#5a3c3c;
margin-bottom:50px;
}

.box{
display:flex;
gap:25px;
justify-content:center;
flex-wrap:wrap;
}

.card{
width:350px;
background:white;
box-shadow:0 0 15px #ddd;
border-radius:8px;
overflow:hidden;
}

.card img{
width:100%;
height:230px;
object-fit:cover;
}

.card h3{
margin-top:20px;
color:#7a3f3f;
}

.card p{
padding-bottom:20px;
font-size:20px;
}

/* TABLE DESIGN */
.table-box{
margin-top:60px;
display:flex;
justify-content:center;
}

table{
width:80%;
border-collapse:collapse;
background:white;
box-shadow:0 0 15px #ddd;
}

th, td{
padding:15px;
border:1px solid #ddd;
}

th{
background:#7a3f3f;
color:white;
}

tr:hover{
background:#ffe5b4;
}

</style>

</head>
<body>

<section class="menu">

<h1>Our Special Menu</h1>

<div class="box">

<div class="card">
<img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=700">
<h3>Chicken Pizza</h3>
<p>₹250</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1621996346565-e3dbc646d9a9?w=700">
<h3>Pasta</h3>
<p>₹300</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=700">
<h3>Lasagna</h3>
<p>₹350</p>
</div>

</div>

<!-- MENU TABLE -->
<div class="table-box">

<table>
<tr>
<th>Category</th>
<th>Item</th>
<th>Price</th>
</tr>

<tr>
<td rowspan="3">Pizza</td>
<td>Chicken Pizza</td>
<td>₹250</td>
</tr>
<tr>
<td>Margherita Pizza</td>
<td>₹220</td>
</tr>
<tr>
<td>Veg Pizza</td>
<td>₹230</td>
</tr>

<tr>
<td rowspan="3">Pasta</td>
<td>White Sauce Pasta</td>
<td>₹300</td>
</tr>
<tr>
<td>Red Sauce Pasta</td>
<td>₹280</td>
</tr>
<tr>
<td>Cheese Pasta</td>
<td>₹320</td>
</tr>

<tr>
<td rowspan="2">Special</td>
<td>Lasagna</td>
<td>₹350</td>
</tr>
<tr>
<td>Garlic Bread</td>
<td>₹150</td>
</tr>

</table>

</div>

<br><br>

<a href="index.html" class="btn-gold">
Back Home
</a>

</section>

</body>
</html>
